name: Weekly Full Benchmark

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

jobs:
  full-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Full eval suite
        run: |
          mythos-eval --mode full --limit 50 --output eval/results/weekly.json
      - uses: actions/upload-artifact@v4
        with:
          name: weekly-eval
          path: eval/results/weekly.json
