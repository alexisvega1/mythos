name: mythos-nano
depth: 12
n_head: 6
n_embd: 768
block_size: 1024
vocab_size: 50304
batch_size: 32
grad_accum: 4
learning_rate: 3.0e-4
weight_decay: 0.1
warmup_steps: 100
max_steps: 10000
train_budget_seconds: 300
optimizer: nor_muon
use_rope: true
use_qk_norm: true
activation: relu2
untied_embeddings: true
val_bpb_gate: 1.01
data:
  pretrain_tokens_b: 0.5
  mix:
    fineweb_edu: 0.85
    stack_v2: 0.10
    synthetic_code: 0.05
eval:
  proxy_every: 50
  full_every: 500
