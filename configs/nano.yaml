name: mythos-nano
depth: 4
n_head: 2
n_embd: 64
block_size: 32
vocab_size: 50257
batch_size: 2
grad_accum: 1
learning_rate: 3.0e-4
weight_decay: 0.1
warmup_steps: 10
max_steps: 10000
train_budget_seconds: 300
optimizer: nor_muon
use_rope: true
use_qk_norm: true
activation: relu2
untied_embeddings: true
val_bpb_gate: 1.01
data:
  source: fixture
  dataset: roneneldan/TinyStories
  tokenizer: gpt2
  fixture_path: data/fixtures/tiny_corpus.txt
  val_holdout_pct: 20
  seed: 42
eval:
  proxy_every: 50
  full_every: 500
  val_batches: 5
