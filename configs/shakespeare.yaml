# Shakespeare pretrain — portfolio-scale (~21M params on MPS in ~1 min)
name: mythos-shakespeare
depth: 4
n_head: 6
n_embd: 192
block_size: 96
vocab_size: 50257
batch_size: 24
grad_accum: 1
learning_rate: 6.0e-4
weight_decay: 0.1
warmup_steps: 40
max_steps: 500
train_budget_seconds: 600
optimizer: nor_muon
use_rope: true
use_qk_norm: true
activation: relu2
untied_embeddings: true
val_bpb_gate: 1.01
data:
  source: fixture
  dataset: roneneldan/TinyStories
  tokenizer: gpt2
  fixture_path: data/corpus/tinyshakespeare.txt
  val_holdout_pct: 10
  seed: 42
eval:
  proxy_every: 50
  full_every: 500
  val_batches: 16
